<!-- templates/hall-close.html -->

<div class="sect">
  <h3>발주 &amp; 재고 체크</h3>
  <p class="hint">품목을 선택하면 단위가 자동으로 채워집니다. 직접 수정도 가능합니다.</p>

  <div class="grouplabel">음료 / 주류</div>
  <div id="hcBevRows"></div>
  <button class="addinv" data-grp="bev">＋ 음료/주류 추가</button>

  <div class="grouplabel">소모품</div>
  <div id="hcConRows"></div>
  <button class="addinv" data-grp="con">＋ 소모품 추가</button>

  <div class="bigcheck" id="hcInvCheck">
    <span class="checkbox" id="hcInvCb"></span>
    <span class="ct">재고 리스트 업데이트 완료</span>
  </div>
</div>

<div class="sect">
  <h3>오픈조 할일</h3>
  <p class="hint">Enter로 추가 — 내일 오픈조가 처리할 항목</p>
  <div id="hcTasks"></div>
  <input id="hcTaskInput" class="noteinput" type="text" placeholder="할일 입력 후 Enter">
</div>

<div class="sect">
  <h3>인수인계 및 특이사항</h3>
  <p class="hint">한 문장씩 입력하고 Enter로 추가</p>
  <div id="hcNotesList" class="notelist"></div>
  <input id="hcNotesInput" class="noteinput" type="text" placeholder="인수인계 문장 입력 후 Enter">
</div>
