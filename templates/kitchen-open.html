<!-- templates/kitchen-open.html — 주방 오픈 마크업만 (로직은 kitchen-open.js) -->

<div class="prog" id="koProg">
  <div class="row"><b id="koCount">0 / 0 확인</b><span id="koLeft">남은 항목 0</span></div>
  <div class="barbox"><div class="fill" id="koFill"></div></div>
</div>

<div class="scorelegend">
  <span><b>%</b> 100이 기준 · 과하면↑ 부족하면↓</span>
  <span><b>점</b> 100이 만점 · 높을수록 좋음</span>
</div>

<div id="koList" class="list"></div>

<div class="addcard">
  <button class="addbig" id="koAddItem">＋ 재료 추가 <span style="font-size:12px;color:var(--muted)">(비정기 항목)</span></button>
</div>

<div class="sect">
  <h3>3일 이상 재고 <span class="auto">자동</span></h3>
  <p class="hint">보고일 − 생산일 ≥ 3일인 생산분이 자동 표시됩니다. 처리 방법(업셀링/타호점송품/직원식사)을 선택하세요.</p>
  <div id="koAged"></div>
</div>

<div class="sect">
  <h3>특이사항</h3>
  <p class="hint">한 문장씩 입력하고 Enter로 추가</p>
  <div id="koNotesList" class="notelist"></div>
  <input id="koNotesInput" class="noteinput" type="text" placeholder="특이사항 문장 입력 후 Enter">
</div>
