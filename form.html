<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>ліҙкі  мһ…л Ҙ</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

<div class="wrap">
  <!-- кі м • н—ӨлҚ” (н•ӯмғҒ н‘ңмӢң) -->
  <div class="top">
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px">
      <button class="back-btn" onclick="history.back()">вҶҗ л’ӨлЎң</button>
      <span class="type-label" id="typeLabel"></span>
    </div>
    <h1 id="formTitle">ліҙкі </h1>
    <div class="meta">
      <div class="fld"><label>м§Җм җ</label><select id="branch"></select></div>
      <div class="fld"><label>ліҙкі мқј</label><input type="date" id="rdate"></div>
      <div class="fld"><label>ліҙкі  мӢңк°„</label><input type="time" id="rtime"></div>
      <div class="fld"><label>мһ‘м„ұмһҗ</label><input id="author" placeholder="мһ‘м„ұмһҗ"></div>
    </div>
  </div>

  <!-- м—¬кё°м—җ template HTMLмқҙ injectлҗЁ -->
  <div id="tplContainer"></div>
</div>

<!-- м ңм¶ң л°” -->
<div class="submit-bar" id="submitBar">
  <div class="inner">
    <button class="submit-btn" id="submitBtn">ліҙкі  м ңм¶ң</button>
  </div>
</div>

<!-- м ңм¶ң кІ°кіј лӘЁлӢ¬ -->
<div class="ov" id="ovSub">
  <div class="sheet">
    <div class="sh"><b>м ңм¶ң лҚ°мқҙн„° (Supabase м ҖмһҘ нҳ•нғң)</b><button id="closeSub">вң•</button></div>
    <div class="sc">
      <div id="saveBox"></div>
      <pre id="jsonOut"></pre>
      <button class="copy-btn" id="copyJson">JSON ліөмӮ¬</button>
    </div>
  </div>
</div>

<!-- мһ¬лЈҢ м¶”к°Җ лӘЁлӢ¬ (мЈјл°© мҳӨн”Ҳ м „мҡ©, templateмқҙ н•„мҡ”мӢң нҷңм„ұнҷ”) -->
<div class="ov" id="ovAdd">
  <div class="sheet">
    <div class="sh"><b>мһ¬лЈҢ м¶”к°Җ</b><button id="closeAdd">вң•</button></div>
    <div class="sc" id="pickBody"></div>
  </div>
</div>

<div class="toast"></div>

<script type="module">
  import { getParams, loadTemplate, getTemplateInfo } from './core/router.js';
  import { submitReport } from './core/submit.js';
  import { BRANCHES, BRANCH_ORDER } from './data/branches.js';
  import { toast } from './core/ui.js';

  const params = getParams();
  const tplInfo = getTemplateInfo(params.type);

  // н—ӨлҚ” мұ„мҡ°кё°
  document.getElementById('typeLabel').textContent = tplInfo?.label || '';
  document.getElementById('formTitle').textContent = (tplInfo?.label || '') + ' ліҙкі ';

  // м§Җм җ select мұ„мҡ°кё°
  const branchSel = document.getElementById('branch');
  BRANCH_ORDER.forEach(b => {
    const o = document.createElement('option');
    o.textContent = b;
    branchSel.appendChild(o);
  });
  branchSel.value = params.branch;
  document.getElementById('rdate').value = params.date;
  document.getElementById('rtime').value = params.time;
  document.getElementById('author').value = params.author;

  // м ңм¶ң л°” н‘ңмӢң
  document.getElementById('submitBar').classList.add('visible');

  // template лЎңл“ң л°Ҹ init
  const container = document.getElementById('tplContainer');
  const mod = await loadTemplate(container, params.type);

  if (mod?.init) {
    mod.init({
      branch: branchSel,
      rdate:  document.getElementById('rdate'),
      author: document.getElementById('author'),
    });
  }

  // м ңм¶ң лІ„нҠј
  document.getElementById('submitBtn').addEventListener('click', async () => {
    if (!mod?.buildPayload) return;
    const payload = mod.buildPayload({
      branch: branchSel.value,
      report_date: document.getElementById('rdate').value,
      report_time: document.getElementById('rtime').value || null,
      shift_type: params.type,
      author: document.getElementById('author').value || null,
    });

    const result = await submitReport(payload);
    const box = document.getElementById('saveBox');
    if (result.ok) {
      box.className = 'savebox ok';
      box.innerHTML = '<b>м ҖмһҘлҗЁ</b> В· reports н…Ңмқҙлё”';
    } else {
      box.className = 'savebox warn';
      box.innerHTML = '<b>лӘЁмқҳ м ҖмһҘ</b> В· Supabase лҜём—°кІ° вҖ” м•„лһҳ нҳ•нғңлЎң reports м—җ insert лҗ©лӢҲлӢӨ';
    }
    document.getElementById('jsonOut').textContent = JSON.stringify(result.row, null, 2);
    document.getElementById('ovSub').classList.add('show');
  });

  // лӘЁлӢ¬ лӢ«кё°
  document.getElementById('closeSub').onclick = () => document.getElementById('ovSub').classList.remove('show');
  document.getElementById('closeAdd').onclick = () => document.getElementById('ovAdd').classList.remove('show');
  document.getElementById('copyJson').onclick = () => {
    navigator.clipboard?.writeText(document.getElementById('jsonOut').textContent)
      .then(() => toast('ліөмӮ¬лҗЁ'), () => toast('ліөмӮ¬ мӢӨнҢЁ'));
  };
  ['ovSub','ovAdd'].forEach(id => {
    document.getElementById(id).addEventListener('click', e => {
      if (e.target === e.currentTarget) e.currentTarget.classList.remove('show');
    });
  });
</script>
</body>
</html>
